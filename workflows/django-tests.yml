name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]   # 可选：PR 时也跑测试

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'   # 改成你项目实际用的 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt   # 如果有 requirements.txt
        # 如果项目没有 requirements.txt，可手动安装 django 和测试依赖，例如：
        # pip install django

    - name: Run tests
      run: |
        python manage.py test apps   # 和你描述中的命令一致
